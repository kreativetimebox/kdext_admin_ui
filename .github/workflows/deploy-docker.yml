name: Build and Deploy Docker Image (SCP, Zero Downtime)

on:
  push:
    branches:
      - [main, master]
  workflow_dispatch:

env:
  IMAGE_NAME: kdext_manual_anaylizer
  IMAGE_TAG: latest
  APP_NAME: kdext_manual_anaylizer
  PROD_PORT: 3004
  TEMP_PORT: 3005
  DEPLOY_DIR: /home/balabantaray-user/kdext   # ✅ FIXED (no /opt)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # --------------------------------------------------
      # 1. Checkout
      # --------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. FREE DISK (IMPORTANT)
      # --------------------------------------------------
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          docker system prune -af --volumes
          df -h

      # --------------------------------------------------
      # 3. Docker setup
      # --------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --------------------------------------------------
      # 4. Build image
      # --------------------------------------------------
      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker builder prune -f

      # --------------------------------------------------
      # 5. Setup SSH
      # --------------------------------------------------
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          HOST=$(echo "${{ secrets.SERVER_HOST }}" | tr -d '\n\r' | xargs)
          PORT=${{ secrets.SERVER_PORT }}
          [ -z "$PORT" ] && PORT=22

          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

      # --------------------------------------------------
      # 6. Save image (LOCAL FILE ONLY)
      # --------------------------------------------------
      - name: Save Docker image
        run: |
          docker save $IMAGE_NAME:$IMAGE_TAG -o image.tar
          ls -lh image.tar

      # --------------------------------------------------
      # 7. Upload (HOME DIR ONLY)
      # --------------------------------------------------
      - name: Upload image
        run: |
          PORT=${{ secrets.SERVER_PORT }}
          [ -z "$PORT" ] && PORT=22

          HOST=$(echo "${{ secrets.SERVER_HOST }}" | tr -d '\n\r' | xargs)

          scp -i ~/.ssh/deploy_key -P "$PORT" \
            -o StrictHostKeyChecking=no \
            image.tar \
            balabantaray-user@"$HOST":~/image.tar

      # --------------------------------------------------
      # 8. Deploy (NO sudo, SAFE)
      # --------------------------------------------------
      - name: Deploy
        run: |
          PORT=${{ secrets.SERVER_PORT }}
          [ -z "$PORT" ] && PORT=22

          HOST=$(echo "${{ secrets.SERVER_HOST }}" | tr -d '\n\r' | xargs)

          ssh -i ~/.ssh/deploy_key -p "$PORT" \
            -o StrictHostKeyChecking=no \
            balabantaray-user@"$HOST" << 'EOF'

              set -e

              APP=kdext_manual_anaylizer
              IMAGE=kdext_manual_anaylizer
              DEPLOY_DIR=/home/balabantaray-user/kdext
              PROD_PORT=3004
              TEMP_PORT=3005

              mkdir -p $DEPLOY_DIR
              cd $DEPLOY_DIR

              echo "📦 Loading image..."
              docker load < ~/image.tar
              rm -f ~/image.tar

              echo "🏷 Backup old image..."
              if docker image inspect ${IMAGE}:latest >/dev/null 2>&1; then
                docker tag ${IMAGE}:latest ${IMAGE}:previous
              fi

              echo "🚀 Start TEMP container..."
              docker rm -f ${APP}_new 2>/dev/null || true

              docker run -d \
                --name ${APP}_new \
                -p ${TEMP_PORT}:3004 \
                --restart unless-stopped \
                -e NODE_ENV=production \
                -e PORT=3004 \
                -e HOSTNAME=0.0.0.0 \
                -e DEXAI_DB_URL=${{ secrets.DEXAI_DB_URL }} \
                -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
                -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY} \
                -e AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }} \
                -e AWS_REGION=${{ secrets.AWS_REGION }} \
                ${IMAGE}:latest

              echo "⏳ Waiting for health..."
              ok=false
              for i in {1..30}; do
                if curl -fs http://127.0.0.1:${TEMP_PORT}/api/health >/dev/null 2>&1 || \
                   curl -fs http://127.0.0.1:${TEMP_PORT} >/dev/null 2>&1; then
                  ok=true
                  echo "✅ Healthy"
                  break
                fi
                sleep 3
              done

              if [ "$ok" != "true" ]; then
                echo "❌ Failed"
                docker logs ${APP}_new
                docker rm -f ${APP}_new
                docker tag ${IMAGE}:previous ${IMAGE}:latest || true
                exit 1
              fi

              echo "🔁 Switch to PROD..."
              docker rm -f ${APP} 2>/dev/null || true

              docker run -d \
                --name ${APP} \
                -p ${PROD_PORT}:3004 \
                --restart unless-stopped \
                -e NODE_ENV=production \
                -e PORT=3004 \
                -e HOSTNAME=0.0.0.0 \
                -e DEXAI_DB_URL=${{ secrets.DEXAI_DB_URL }} \
                -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
                -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY} \
                -e AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }} \
                -e AWS_REGION=${{ secrets.AWS_REGION }} \
                ${IMAGE}:latest

              docker rm -f ${APP}_new || true

              echo "✅ Deployment done"

          EOF

      # --------------------------------------------------
      # 9. Verify
      # --------------------------------------------------
      - name: Verify
        run: |
          PORT=${{ secrets.SERVER_PORT }}
          [ -z "$PORT" ] && PORT=22

          HOST=$(echo "${{ secrets.SERVER_HOST }}" | tr -d '\n\r' | xargs)

          ssh -i ~/.ssh/deploy_key -p "$PORT" \
            -o StrictHostKeyChecking=no \
            balabantaray-user@"$HOST" \
            "docker ps | grep kdext_manual_anaylizer"
